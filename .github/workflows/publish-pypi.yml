name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build release distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install "Build==1.3.0"
      - run: python -m build
      - uses: actions/upload-artifact@v6
        with:
          name: penpal-python-distributions
          path: dist/*
          if-no-files-found: error

  pypi-publish:
    name: Publish release distributions
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/penpal-enum
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: penpal-python-distributions
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
