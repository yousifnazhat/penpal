name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install ".[dev]"
      - run: python scripts/check.py

  pi-harness:
    name: PI harness / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22.19.0"
          package-manager-cache: false
      - run: python -m pip install .
      - name: Verify Bash setup
        if: runner.os == 'Linux'
        run: ./scripts/setup-pi.sh
      - name: Verify PowerShell setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/setup-pi.ps1
        env:
          PENPAL_PYTHON: python

  distribution:
    name: Distribution artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install "Build==1.3.0"
      - run: python -m build
      - name: Smoke installed wheel outside checkout
        run: |
          python -m venv "$RUNNER_TEMP/penpal-wheel"
          "$RUNNER_TEMP/penpal-wheel/bin/python" -m pip install dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/penpal-wheel/bin/penpal" --version
          "$RUNNER_TEMP/penpal-wheel/bin/penpal" doctor --json
          "$RUNNER_TEMP/penpal-wheel/bin/penpal" playbooks playbooks
          "$RUNNER_TEMP/penpal-wheel/bin/penpal" sources list
          "$RUNNER_TEMP/penpal-wheel/bin/penpal" --help
      - uses: actions/upload-artifact@v6
        with:
          name: penpal-python-distributions
          path: dist/*
          if-no-files-found: error
